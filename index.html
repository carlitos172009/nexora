<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexora</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    :root{
      --primary:#7f5af0;
      --secondary:#2cb67d;
      --dark:#0f172a;
      --light:#f8fafc;
      --card:#ffffff;
      --text:#1e293b;
      --muted:#64748b;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:
      linear-gradient(
        135deg,
        #f8fafc 0%,
        #eef2ff 100%
      );

      font-family:'Poppins',sans-serif;
      color:var(--text);
      overflow-x:hidden;
    }

    /* NAVBAR */

    .navbar{
      background:rgba(15,23,42,0.95);
      backdrop-filter:blur(10px);
      padding:16px 30px;
      box-shadow:0 4px 20px rgba(0,0,0,0.15);
    }

    .navbar-brand{
      font-size:1.8rem;
      font-weight:700;
      letter-spacing:1px;
      color:white !important;
    }

    .search-box input{
      border:none;
      border-radius:50px;
      padding:14px 20px;
      background:#f1f5f9;
      transition:0.3s;
      font-size:15px;
    }

    .search-box input:focus{
      box-shadow:0 0 0 4px rgba(127,90,240,0.2);
      background:white;
    }

    /* HERO */

    .hero{
      position:relative;
      overflow:hidden;

      background:
      linear-gradient(
        135deg,
        #7f5af0 0%,
        #6246ea 40%,
        #2cb67d 100%
      );

      padding:100px 20px;
      text-align:center;
      color:white;
    }

    .hero::before{
      content:'';
      position:absolute;
      width:500px;
      height:500px;
      background:rgba(255,255,255,0.1);
      border-radius:50%;
      top:-250px;
      right:-150px;
    }

    .hero h1{
      font-size:4rem;
      font-weight:700;
      margin-bottom:15px;
      position:relative;
      z-index:2;
    }

    .hero p{
      font-size:1.2rem;
      opacity:0.9;
      position:relative;
      z-index:2;
    }

    /* PRODUCT CARDS */

    .product-card{
      border:none;
      border-radius:25px;
      overflow:hidden;

      background:rgba(255,255,255,0.75);

      backdrop-filter:blur(15px);

      box-shadow:
      0 10px 30px rgba(0,0,0,0.08);

      transition:all 0.35s ease;
    }

    .product-card:hover{
      transform:translateY(-10px);
      box-shadow:
      0 20px 40px rgba(127,90,240,0.18);
    }

    .product-img{
      height:260px;
      object-fit:cover;
      transition:0.4s ease;
      cursor:pointer;
    }

    .product-card:hover .product-img{
      transform:scale(1.06);
    }

    .card-body{
      padding:22px;
    }

    .card-body h5{
      font-weight:600;
      margin-bottom:10px;
      transition:0.3s;
    }

    .card-body h5:hover{
      color:var(--primary);
    }

    .price{
      color:var(--secondary);
      font-size:1.4rem;
      font-weight:700;
      margin-bottom:20px;
    }

    /* BUTTONS */

    .btn-warning{
      background:linear-gradient(
        135deg,
        var(--primary),
        #6246ea
      );

      border:none;
      color:white;
      font-weight:500;
      border-radius:14px;
      padding:12px 18px;
      transition:0.3s;
    }

    .btn-warning:hover{
      transform:translateY(-2px);
      background:linear-gradient(
        135deg,
        #6d47f5,
        #5038d8
      );
      color:white;
    }

    .btn-outline-danger{
      border-radius:14px;
      width:50px;
    }

    .btn-outline-danger:hover{
      background:#ff4d6d;
      border-color:#ff4d6d;
    }

    /* BADGES */

    .badge-cart{
      position:absolute;
      top:-8px;
      right:-8px;

      background:#ff4d6d;
      color:white;

      border-radius:50%;
      width:22px;
      height:22px;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:12px;
      font-weight:600;
    }

    /* MODALS */

    .modal-content{
      border:none;
      border-radius:25px;
      overflow:hidden;
    }

    .modal-header{
      border:none;
      padding:20px 25px;
    }

    .modal-body{
      padding:25px;
    }

    /* CART ITEMS */

    .cart-item,
    .wishlist-item{
      padding:15px 0;
      border-bottom:1px solid #e2e8f0;
    }

    /* FOOTER */

    footer{
      margin-top:80px;
      background:#0f172a;
      color:white;
      padding:40px 20px;
      text-align:center;
    }

    footer p{
      margin:0;
      opacity:0.8;
      font-size:15px;
    }

    /* RESPONSIVE */

    @media(max-width:768px){

      .hero h1{
        font-size:2.7rem;
      }

      .navbar{
        padding:15px;
      }

      .search-box{
        margin:15px 0;
      }

    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">

  <div class="container-fluid">

    <a class="navbar-brand" href="#">
      <i class="bi bi-bag-heart-fill"></i>
      Nexora
    </a>

    <div class="search-box w-100 mx-4">

      <input
        type="text"
        id="searchInput"
        class="form-control"
        placeholder="Search futuristic products..."
      />

    </div>

    <div class="d-flex align-items-center gap-3">

      <button
        class="btn btn-warning position-relative"
        data-bs-toggle="modal"
        data-bs-target="#cartModal"
      >
        <i class="bi bi-cart-fill"></i>
        <span id="cartCount" class="badge-cart">0</span>
      </button>

      <button
        class="btn btn-light position-relative"
        data-bs-toggle="modal"
        data-bs-target="#wishlistModal"
      >
        <i class="bi bi-heart-fill text-danger"></i>

        <span id="wishlistCount" class="badge-cart">0</span>
      </button>

    </div>

  </div>

</nav>

<!-- HERO -->

<section class="hero">

  <div class="container">

    <h1>Shop The Future</h1>

    <p>
      Discover premium gadgets, fashion and tech products.
    </p>

  </div>

</section>

<!-- PRODUCTS -->

<div class="container mt-5">
  <div class="row" id="productList"></div>
</div>

<!-- PRODUCT DETAILS MODAL -->

<div class="modal fade" id="productModal" tabindex="-1">

  <div class="modal-dialog modal-lg">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title" id="modalTitle"></h5>

        <button
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>

      </div>

      <div class="modal-body text-center">

        <img
          id="modalImage"
          class="img-fluid rounded-4 mb-4"
          style="max-height:350px; object-fit:cover;"
        />

        <h3 class="price" id="modalPrice"></h3>

        <p id="modalDescription"></p>

      </div>

    </div>

  </div>

</div>

<!-- CART MODAL -->

<div class="modal fade" id="cartModal" tabindex="-1">

  <div class="modal-dialog modal-lg">

    <div class="modal-content">

      <div class="modal-header bg-warning text-white">

        <h5 class="modal-title">
          Shopping Cart
        </h5>

        <button
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
        ></button>

      </div>

      <div class="modal-body">

        <div id="cartItems"></div>

        <h4 class="mt-4 fw-bold">
          Total:
          $<span id="cartTotal">0</span>
        </h4>

      </div>

      <div class="modal-footer">

        <button
          class="btn btn-success px-4 py-2 rounded-4"
          onclick="checkout()"
        >
          Buy Now
        </button>

      </div>

    </div>

  </div>

</div>

<!-- WISHLIST MODAL -->

<div class="modal fade" id="wishlistModal" tabindex="-1">

  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header bg-danger text-white">

        <h5 class="modal-title">
          Wishlist
        </h5>

        <button
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
        ></button>

      </div>

      <div class="modal-body">

        <div id="wishlistItems"></div>

      </div>

    </div>

  </div>

</div>

<!-- FOOTER -->

<footer>

  <p>
    © 2026 Nexora — Crafted with style & innovation.
  </p>

</footer>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const products = [
  {
    id:1,
    name:"Gaming Laptop",
    price:1200,
    description:"High-performance gaming laptop with RTX graphics and 16GB RAM.",
    image:"https://images.unsplash.com/photo-1517336714739-489689fd1ca8?q=80&w=1200"
  },
  {
    id:2,
    name:"Wireless Headphones",
    price:250,
    description:"Noise-cancelling wireless headphones with premium sound quality.",
    image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1200"
  },
  {
    id:3,
    name:"Smartphone",
    price:899,
    description:"Latest smartphone with amazing camera and OLED display.",
    image:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1200"
  },
  {
    id:4,
    name:"Smart Watch",
    price:350,
    description:"Track your fitness and notifications with this smart watch.",
    image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200"
  }
];

let cart = [];
let wishlist = [];

const productList = document.getElementById("productList");

function displayProducts(items){

  productList.innerHTML = "";

  items.forEach(product=>{

    productList.innerHTML += `

      <div class="col-lg-3 col-md-6 mb-4">

        <div class="card product-card h-100">

          <img
            src="${product.image}"
            class="card-img-top product-img"
            onclick="showProduct(${product.id})"
          >

          <div class="card-body d-flex flex-column">

            <h5 onclick="showProduct(${product.id})">
              ${product.name}
            </h5>

            <p class="price">$${product.price}</p>

            <div class="mt-auto d-flex gap-2">

              <button
                class="btn btn-warning w-100"
                onclick="addToCart(${product.id})"
              >
                <i class="bi bi-cart-plus"></i>
                Add
              </button>

              <button
                class="btn btn-outline-danger"
                onclick="toggleWishlist(${product.id}, this)"
              >
                <i class="bi bi-heart"></i>
              </button>

            </div>

          </div>

        </div>

      </div>

    `;
  });
}

function showProduct(id){

  const product = products.find(p=>p.id===id);

  document.getElementById("modalTitle").innerText = product.name;
  document.getElementById("modalImage").src = product.image;
  document.getElementById("modalPrice").innerText = "$"+product.price;
  document.getElementById("modalDescription").innerText = product.description;

  new bootstrap.Modal(
    document.getElementById("productModal")
  ).show();
}

function addToCart(id){

  const product = products.find(p=>p.id===id);

  const existing = cart.find(item=>item.id===id);

  if(existing){
    existing.quantity++;
  }else{
    cart.push({...product,quantity:1});
  }

  updateCart();
}

function updateCart(){

  const cartItems = document.getElementById("cartItems");

  const cartCount = document.getElementById("cartCount");

  const cartTotal = document.getElementById("cartTotal");

  cartItems.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach(item=>{

    total += item.price * item.quantity;
    count += item.quantity;

    cartItems.innerHTML += `

      <div class="cart-item d-flex justify-content-between align-items-center">

        <div>

          <strong>${item.name}</strong>

          <br>

          $${item.price} × ${item.quantity}

        </div>

        <button
          class="btn btn-danger btn-sm rounded-3"
          onclick="removeFromCart(${item.id})"
        >
          Remove
        </button>

      </div>

    `;
  });

  cartCount.innerText = count;
  cartTotal.innerText = total;
}

function removeFromCart(id){

  cart = cart.filter(item=>item.id!==id);

  updateCart();
}

function toggleWishlist(id,button){

  const product = products.find(p=>p.id===id);

  const exists = wishlist.find(item=>item.id===id);

  if(exists){

    wishlist = wishlist.filter(item=>item.id!==id);

    button.classList.remove("active");

  }else{

    wishlist.push(product);

    button.classList.add("active");
  }

  updateWishlist();
}

function updateWishlist(){

  const wishlistItems =
  document.getElementById("wishlistItems");

  const wishlistCount =
  document.getElementById("wishlistCount");

  wishlistItems.innerHTML = "";

  wishlist.forEach(item=>{

    wishlistItems.innerHTML += `

      <div class="wishlist-item">

        <strong>${item.name}</strong>

        <br>

        $${item.price}

      </div>

    `;
  });

  wishlistCount.innerText = wishlist.length;
}

function checkout(){

  if(cart.length===0){

    alert("Your cart is empty!");

    return;
  }

  alert("Purchase completed successfully!");

  cart = [];

  updateCart();

  bootstrap.Modal
  .getInstance(document.getElementById("cartModal"))
  .hide();
}

document
.getElementById("searchInput")
.addEventListener("keyup",(e)=>{

  const value = e.target.value.toLowerCase();

  const filtered = products.filter(product=>

    product.name
    .toLowerCase()
    .includes(value)

  );

  displayProducts(filtered);
});

displayProducts(products);

</script>

</body>
</html>
