<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexora</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <style>
    body {
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .navbar {
      background: #131921;
    }

    .navbar-brand,
    .nav-link,
    .navbar-text {
      color: white !important;
    }

    .hero {
      background: linear-gradient(to right, #7f5af0, #2cb67d);
      padding: 60px 20px;
      text-align: center;
      color: white;
      font-weight: bold;
    }

    .product-card {
      transition: 0.3s;
      border-radius: 15px;
      overflow: hidden;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .product-img {
      height: 220px;
      object-fit: cover;
      cursor: pointer;
    }

    .price {
      color: green;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .wishlist-btn.active {
      color: red;
    }

    footer {
      background: #131921;
      color: white;
      padding: 20px;
      text-align: center;
      margin-top: 40px;
    }

    .cart-item,
    .wishlist-item {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }

    .badge-cart {
      background: red;
      color: white;
      border-radius: 50%;
      padding: 3px 8px;
      font-size: 12px;
    }

    .search-box {
      max-width: 500px;
      margin: auto;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark px-3">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">
      Nexora
    </a>

    <div class="search-box w-100 mx-4">
      <input
        type="text"
        id="searchInput"
        class="form-control"
        placeholder="Search products..."
      />
    </div>

    <div class="d-flex align-items-center gap-3">
      <button class="btn btn-warning position-relative" data-bs-toggle="modal" data-bs-target="#cartModal">
        <i class="bi bi-cart-fill"></i>
        Cart
        <span id="cartCount" class="badge-cart">0</span>
      </button>

      <button class="btn btn-light position-relative" data-bs-toggle="modal" data-bs-target="#wishlistModal">
        <i class="bi bi-heart-fill text-danger"></i>
        Wishlist
        <span id="wishlistCount" class="badge-cart">0</span>
      </button>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Welcome to Nexora</h1>
  <p>The future of online shopping</p>
</section>

<!-- PRODUCTS -->
<div class="container mt-5">
  <div class="row" id="productList"></div>
</div>

<!-- PRODUCT DETAILS MODAL -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"></h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <img
          id="modalImage"
          class="img-fluid rounded mb-3"
          style="max-height:300px; object-fit:cover;"
        />

        <h4 class="text-success" id="modalPrice"></h4>

        <p id="modalDescription"></p>
      </div>

    </div>
  </div>
</div>

<!-- CART MODAL -->
<div class="modal fade" id="cartModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-warning">
        <h5 class="modal-title">Shopping Cart</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div id="cartItems"></div>

        <h4 class="mt-3">
          Total: $<span id="cartTotal">0</span>
        </h4>
      </div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="checkout()">
          Buy Now
        </button>
      </div>
    </div>
  </div>
</div>

<!-- WISHLIST MODAL -->
<div class="modal fade" id="wishlistModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title">Wishlist</h5>
        <button class="btn-close bg-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div id="wishlistItems"></div>
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Nexora Store - Full Ecommerce Demo</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

  const products = [
    {
      id: 1,
      name: "Gaming Laptop",
      price: 1200,
      description: "High-performance gaming laptop with RTX graphics and 16GB RAM.",
      image: "https://images.unsplash.com/photo-1517336714739-489689fd1ca8?q=80&w=1200"
    },
    {
      id: 2,
      name: "Wireless Headphones",
      price: 250,
      description: "Noise-cancelling wireless headphones with premium sound quality.",
      image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1200"
    },
    {
      id: 3,
      name: "Smartphone",
      price: 899,
      description: "Latest smartphone with amazing camera and OLED display.",
      image: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1200"
    },
    {
      id: 4,
      name: "Smart Watch",
      price: 350,
      description: "Track your fitness and notifications with this smart watch.",
      image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200"
    },
    {
      id: 5,
      name: "Camera",
      price: 650,
      description: "Professional DSLR camera for photography and video recording.",
      image: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=1200"
    },
    {
      id: 6,
      name: "Sneakers",
      price: 140,
      description: "Comfortable and stylish sneakers for everyday use.",
      image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200"
    },
    {
      id: 7,
      name: "Bluetooth Speaker",
      price: 180,
      description: "Portable Bluetooth speaker with deep bass and waterproof design.",
      image: "https://images.unsplash.com/photo-1589003077984-894e133dabab?q=80&w=1200"
    },
    {
      id: 8,
      name: "Mechanical Keyboard",
      price: 130,
      description: "RGB mechanical keyboard with fast tactile switches.",
      image: "https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?q=80&w=1200"
    },
    {
      id: 9,
      name: "Gaming Mouse",
      price: 75,
      description: "High precision gaming mouse with customizable DPI settings.",
      image: "https://images.unsplash.com/photo-1527814050087-3793815479db?q=80&w=1200"
    },
    {
      id: 10,
      name: "Tablet",
      price: 500,
      description: "Lightweight tablet perfect for entertainment and productivity.",
      image: "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?q=80&w=1200"
    },
    {
      id: 11,
      name: "Backpack",
      price: 95,
      description: "Modern backpack with laptop compartment and USB charging port.",
      image: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200"
    },
    {
      id: 12,
      name: "4K Monitor",
      price: 420,
      description: "Ultra HD 4K monitor with vibrant colors and smooth refresh rate.",
      image: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?q=80&w=1200"
    }
  ];

  let cart = [];
  let wishlist = [];

  const productList = document.getElementById("productList");

  function displayProducts(items) {
    productList.innerHTML = "";

    items.forEach(product => {
      productList.innerHTML += `
        <div class="col-md-4 mb-4">
          <div class="card product-card h-100">

            <img
              src="${product.image}"
              class="card-img-top product-img"
              onclick="showProduct(${product.id})"
            >

            <div class="card-body d-flex flex-column">

              <h5
                style="cursor:pointer"
                onclick="showProduct(${product.id})"
              >
                ${product.name}
              </h5>

              <p class="price">$${product.price}</p>

              <div class="mt-auto d-flex gap-2">

                <button
                  class="btn btn-warning w-100"
                  onclick="addToCart(${product.id})"
                >
                  <i class="bi bi-cart-plus"></i>
                  Add to Cart
                </button>

                <button
                  class="btn btn-outline-danger"
                  onclick="toggleWishlist(${product.id}, this)"
                >
                  <i class="bi bi-heart"></i>
                </button>

              </div>
            </div>
          </div>
        </div>
      `;
    });
  }

  function showProduct(id) {
    const product = products.find(p => p.id === id);

    document.getElementById("modalTitle").innerText = product.name;
    document.getElementById("modalImage").src = product.image;
    document.getElementById("modalPrice").innerText = "$" + product.price;
    document.getElementById("modalDescription").innerText = product.description;

    const modal = new bootstrap.Modal(
      document.getElementById("productModal")
    );

    modal.show();
  }

  function addToCart(id) {
    const product = products.find(p => p.id === id);

    const existing = cart.find(item => item.id === id);

    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({
        ...product,
        quantity: 1
      });
    }

    updateCart();
  }

  function removeFromCart(id) {
    cart = cart.filter(item => item.id !== id);
    updateCart();
  }

  function updateCart() {

    const cartItems = document.getElementById("cartItems");
    const cartCount = document.getElementById("cartCount");
    const cartTotal = document.getElementById("cartTotal");

    cartItems.innerHTML = "";

    let total = 0;
    let count = 0;

    cart.forEach(item => {

      total += item.price * item.quantity;
      count += item.quantity;

      cartItems.innerHTML += `
        <div class="cart-item d-flex justify-content-between align-items-center">

          <div>
            <strong>${item.name}</strong>
            <br>
            $${item.price} × ${item.quantity}
          </div>

          <div class="d-flex gap-2">

            <button
              class="btn btn-sm btn-secondary"
              onclick="decreaseQuantity(${item.id})"
            >
              -
            </button>

            <button
              class="btn btn-sm btn-success"
              onclick="increaseQuantity(${item.id})"
            >
              +
            </button>

            <button
              class="btn btn-sm btn-danger"
              onclick="removeFromCart(${item.id})"
            >
              Remove
            </button>

          </div>

        </div>
      `;
    });

    cartCount.innerText = count;
    cartTotal.innerText = total;
  }

  function increaseQuantity(id) {
    const item = cart.find(product => product.id === id);

    item.quantity++;

    updateCart();
  }

  function decreaseQuantity(id) {
    const item = cart.find(product => product.id === id);

    if (item.quantity > 1) {
      item.quantity--;
    } else {
      removeFromCart(id);
    }

    updateCart();
  }

  function toggleWishlist(id, button) {

    const product = products.find(p => p.id === id);

    const exists = wishlist.find(item => item.id === id);

    if (exists) {

      wishlist = wishlist.filter(item => item.id !== id);

      button.classList.remove("active");

    } else {

      wishlist.push(product);

      button.classList.add("active");
    }

    updateWishlist();
  }

  function updateWishlist() {

    const wishlistItems = document.getElementById("wishlistItems");
    const wishlistCount = document.getElementById("wishlistCount");

    wishlistItems.innerHTML = "";

    wishlist.forEach(item => {

      wishlistItems.innerHTML += `
        <div class="wishlist-item">
          <strong>${item.name}</strong>
          <br>
          $${item.price}
        </div>
      `;
    });

    wishlistCount.innerText = wishlist.length;
  }

  function checkout() {

    if (cart.length === 0) {
      alert("Your cart is empty!");
      return;
    }

    alert("Purchase completed successfully!");

    cart = [];

    updateCart();

    const modal = bootstrap.Modal.getInstance(
      document.getElementById('cartModal')
    );

    modal.hide();
  }

  document.getElementById("searchInput")
    .addEventListener("keyup", (e) => {

      const value = e.target.value.toLowerCase();

      const filtered = products.filter(product =>
        product.name.toLowerCase().includes(value)
      );

      displayProducts(filtered);
    });

  displayProducts(products);

</script>

</body>
</html>
