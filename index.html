<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexora</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- AOS Animation -->
  <link
    href="https://unpkg.com/aos@2.3.4/dist/aos.css"
    rel="stylesheet"
  />

  <style>

    :root{
      --primary:#7f5af0;
      --primary-dark:#6246ea;
      --secondary:#2cb67d;
      --dark:#0f172a;
      --light:#f8fafc;
      --card:#ffffff;
      --text:#1e293b;
      --muted:#64748b;
      --danger:#ff4d6d;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Poppins',sans-serif;

      background:
      linear-gradient(
        135deg,
        #f8fafc 0%,
        #eef2ff 100%
      );

      color:var(--text);
      overflow-x:hidden;
      transition:0.4s ease;
    }

    body.dark-mode{
      background:#020617;
      color:#f1f5f9;
    }

    /* NAVBAR */

    .navbar{
      background:rgba(15,23,42,0.92);
      backdrop-filter:blur(14px);
      padding:16px 30px;
      box-shadow:0 6px 25px rgba(0,0,0,0.2);
    }

    .navbar-brand{
      color:white !important;
      font-size:1.8rem;
      font-weight:700;
      letter-spacing:1px;
    }

    .search-box input{
      border:none;
      border-radius:50px;
      padding:14px 22px;
      background:#f1f5f9;
      font-size:15px;
      transition:0.3s ease;
    }

    .search-box input:focus{
      background:white;
      box-shadow:0 0 0 4px rgba(127,90,240,0.2);
    }

    /* HERO */

    .hero{
      position:relative;
      overflow:hidden;

      background:
      linear-gradient(
        135deg,
        #7f5af0 0%,
        #6246ea 50%,
        #2cb67d 100%
      );

      padding:120px 20px;
      color:white;
      text-align:center;
    }

    .hero::before{
      content:'';
      position:absolute;
      width:600px;
      height:600px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      top:-300px;
      right:-200px;
    }

    .hero h1{
      font-size:4.5rem;
      font-weight:700;
      margin-bottom:20px;
      position:relative;
      z-index:2;
    }

    .hero p{
      font-size:1.2rem;
      opacity:0.92;
      position:relative;
      z-index:2;
    }

    /* CATEGORY PILLS */

    .categories{
      margin-top:-30px;
      position:relative;
      z-index:10;
    }

    .category-pill{
      background:white;
      border:none;
      border-radius:50px;
      padding:12px 20px;
      font-weight:500;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .category-pill:hover,
    .category-pill.active{
      background:var(--primary);
      color:white;
      transform:translateY(-2px);
    }

    /* PRODUCT CARD */

    .product-card{
      border:none;
      border-radius:24px;
      overflow:hidden;

      background:rgba(255,255,255,0.8);

      backdrop-filter:blur(12px);

      box-shadow:
      0 10px 30px rgba(0,0,0,0.08);

      transition:0.35s ease;
    }

    .product-card:hover{
      transform:translateY(-10px);
      box-shadow:
      0 20px 40px rgba(127,90,240,0.18);
    }

    .product-img-wrapper{
      overflow:hidden;
      position:relative;
    }

    .product-img{
      height:260px;
      width:100%;
      object-fit:cover;
      transition:0.5s ease;
      cursor:pointer;
    }

    .product-card:hover .product-img{
      transform:scale(1.08);
    }

    .product-badge{
      position:absolute;
      top:15px;
      left:15px;
      background:var(--danger);
      color:white;
      padding:6px 12px;
      border-radius:50px;
      font-size:12px;
      font-weight:600;
    }

    .card-body{
      padding:22px;
    }

    .card-body h5{
      font-weight:600;
      cursor:pointer;
      margin-bottom:10px;
      transition:0.3s;
    }

    .card-body h5:hover{
      color:var(--primary);
    }

    .product-desc{
      color:var(--muted);
      font-size:14px;
      margin-bottom:15px;
    }

    .price{
      color:var(--secondary);
      font-size:1.4rem;
      font-weight:700;
    }

    /* BUTTONS */

    .btn-primary-custom{
      background:
      linear-gradient(
        135deg,
        var(--primary),
        var(--primary-dark)
      );

      color:white;
      border:none;
      border-radius:14px;
      padding:12px 18px;
      font-weight:600;
      transition:0.3s ease;
    }

    .btn-primary-custom:hover{
      transform:translateY(-2px);
      opacity:0.95;
    }

    .btn-wishlist{
      border-radius:14px;
      width:50px;
      border:2px solid #ffd2da;
      background:white;
      transition:0.3s;
    }

    .btn-wishlist:hover{
      background:#ff4d6d;
      color:white;
    }

    .btn-wishlist.active{
      background:#ff4d6d;
      color:white;
    }

    /* BADGES */

    .badge-cart{
      position:absolute;
      top:-8px;
      right:-8px;

      width:22px;
      height:22px;

      border-radius:50%;

      display:flex;
      align-items:center;
      justify-content:center;

      background:var(--danger);
      color:white;

      font-size:12px;
      font-weight:700;
    }

    /* MODALS */

    .modal-content{
      border:none;
      border-radius:25px;
      overflow:hidden;
    }

    .modal-header{
      border:none;
      padding:22px;
    }

    .modal-body{
      padding:25px;
    }

    /* CART */

    .cart-item,
    .wishlist-item{
      padding:16px 0;
      border-bottom:1px solid #e2e8f0;
    }

    /* TOAST */

    .toast-notification{
      position:fixed;
      top:25px;
      right:25px;
      background:#0f172a;
      color:white;
      padding:14px 20px;
      border-radius:14px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      z-index:9999;
      opacity:0;
      transform:translateY(-20px);
      transition:0.4s;
    }

    .toast-notification.show{
      opacity:1;
      transform:translateY(0);
    }

    /* FOOTER */

    footer{
      margin-top:80px;
      background:#0f172a;
      color:white;
      padding:60px 20px;
      text-align:center;
    }

    footer h3{
      margin-bottom:10px;
      font-weight:700;
    }

    footer p{
      opacity:0.8;
      margin-bottom:20px;
    }

    .socials{
      display:flex;
      justify-content:center;
      gap:18px;
      font-size:1.4rem;
    }

    .socials i{
      cursor:pointer;
      transition:0.3s;
    }

    .socials i:hover{
      color:var(--primary);
      transform:translateY(-3px);
    }

    /* DARK MODE */

    body.dark-mode .product-card{
      background:#111827;
      color:white;
    }

    body.dark-mode .category-pill{
      background:#1e293b;
      color:white;
    }

    body.dark-mode .search-box input{
      background:#1e293b;
      color:white;
    }

    body.dark-mode .modal-content{
      background:#111827;
      color:white;
    }

    body.dark-mode .product-desc{
      color:#cbd5e1;
    }

    /* RESPONSIVE */

    @media(max-width:768px){

      .hero h1{
        font-size:2.8rem;
      }

      .navbar{
        padding:15px;
      }

      .search-box{
        margin:15px 0;
      }

    }

  </style>
</head>

<body>

<!-- TOAST -->

<div id="toast" class="toast-notification">
  Product added successfully
</div>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark">

  <div class="container-fluid">

    <a class="navbar-brand" href="#">
      <i class="bi bi-bag-heart-fill"></i>
      Nexora
    </a>

    <div class="search-box w-100 mx-4">

      <input
        type="text"
        id="searchInput"
        class="form-control"
        placeholder="Search futuristic products..."
      />

    </div>

    <div class="d-flex align-items-center gap-3">

      <!-- DARK MODE -->

      <button
        class="btn btn-light rounded-circle"
        onclick="toggleDarkMode()"
      >
        <i class="bi bi-moon-fill"></i>
      </button>

      <!-- CART -->

      <button
        class="btn btn-primary-custom position-relative"
        data-bs-toggle="modal"
        data-bs-target="#cartModal"
      >
        <i class="bi bi-cart-fill"></i>

        <span id="cartCount" class="badge-cart">
          0
        </span>
      </button>

      <!-- WISHLIST -->

      <button
        class="btn btn-light position-relative rounded-4"
        data-bs-toggle="modal"
        data-bs-target="#wishlistModal"
      >
        <i class="bi bi-heart-fill text-danger"></i>

        <span id="wishlistCount" class="badge-cart">
          0
        </span>
      </button>

    </div>

  </div>

</nav>

<!-- HERO -->

<section class="hero">

  <div class="container">

    <h1 data-aos="fade-up">
      Shop The Future
    </h1>

    <p data-aos="fade-up" data-aos-delay="150">
      Premium gadgets, fashion and technology.
    </p>

  </div>

</section>

<!-- CATEGORY FILTERS -->

<div class="container categories">

  <div class="d-flex flex-wrap gap-3 justify-content-center">

    <button class="category-pill active">
      All
    </button>

    <button class="category-pill">
      Electronics
    </button>

    <button class="category-pill">
      Fashion
    </button>

    <button class="category-pill">
      Gaming
    </button>

    <button class="category-pill">
      Accessories
    </button>

  </div>

</div>

<!-- PRODUCTS -->

<div class="container mt-5">

  <div class="row" id="productList"></div>

</div>

<!-- PRODUCT MODAL -->

<div class="modal fade" id="productModal" tabindex="-1">

  <div class="modal-dialog modal-lg">

    <div class="modal-content">

      <div class="modal-header">

        <h5 id="modalTitle"></h5>

        <button
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>

      </div>

      <div class="modal-body text-center">

        <img
          id="modalImage"
          class="img-fluid rounded-4 mb-4"
          style="max-height:350px; object-fit:cover;"
        >

        <h3 class="price" id="modalPrice"></h3>

        <p id="modalDescription"></p>

      </div>

    </div>

  </div>

</div>

<!-- CART MODAL -->

<div class="modal fade" id="cartModal" tabindex="-1">

  <div class="modal-dialog modal-lg">

    <div class="modal-content">

      <div class="modal-header bg-primary text-white">

        <h5>
          Shopping Cart
        </h5>

        <button
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
        ></button>

      </div>

      <div class="modal-body">

        <div id="cartItems"></div>

        <h4 class="mt-4 fw-bold">
          Total:
          $<span id="cartTotal">0</span>
        </h4>

      </div>

      <div class="modal-footer">

        <button
          class="btn btn-success rounded-4 px-4"
          onclick="checkout()"
        >
          Buy Now
        </button>

      </div>

    </div>

  </div>

</div>

<!-- WISHLIST MODAL -->

<div class="modal fade" id="wishlistModal" tabindex="-1">

  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header bg-danger text-white">

        <h5>
          Wishlist
        </h5>

        <button
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
        ></button>

      </div>

      <div class="modal-body">

        <div id="wishlistItems"></div>

      </div>

    </div>

  </div>

</div>

<!-- FOOTER -->

<footer>

  <h3>Nexora</h3>

  <p>
    Crafted with innovation, design and futuristic ecommerce aesthetics.
  </p>

  <div class="socials">

    <i class="bi bi-instagram"></i>
    <i class="bi bi-twitter-x"></i>
    <i class="bi bi-facebook"></i>
    <i class="bi bi-github"></i>

  </div>

</footer>

<!-- SCRIPTS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

AOS.init({
  duration:900,
  once:true
});

const products = [

  {
    id:1,
    name:"Gaming Laptop",
    price:1200,
    description:"RTX graphics and ultra-fast performance.",
    badge:"HOT",
    image:"https://images.unsplash.com/photo-1517336714739-489689fd1ca8?q=80&w=1200"
  },

  {
    id:2,
    name:"Wireless Headphones",
    price:250,
    description:"Noise cancelling premium sound experience.",
    badge:"NEW",
    image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1200"
  },

  {
    id:3,
    name:"Smartphone",
    price:899,
    description:"Flagship camera and OLED display.",
    badge:"TRENDING",
    image:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1200"
  },

  {
    id:4,
    name:"Smart Watch",
    price:350,
    description:"Fitness tracking and smart notifications.",
    badge:"SALE",
    image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200"
  },

  {
    id:5,
    name:"Mechanical Keyboard",
    price:150,
    description:"RGB mechanical keyboard for gamers.",
    badge:"PRO",
    image:"https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?q=80&w=1200"
  },

  {
    id:6,
    name:"Sneakers",
    price:140,
    description:"Minimal futuristic streetwear sneakers.",
    badge:"LIMITED",
    image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200"
  }

];

let cart = [];
let wishlist = [];

const productList = document.getElementById("productList");

function displayProducts(items){

  productList.innerHTML = "";

  items.forEach((product,index)=>{

    productList.innerHTML += `

      <div
        class="col-lg-4 col-md-6 mb-4"
        data-aos="zoom-in"
        data-aos-delay="${index * 80}"
      >

        <div class="card product-card h-100">

          <div class="product-img-wrapper">

            <span class="product-badge">
              ${product.badge}
            </span>

            <img
              src="${product.image}"
              class="product-img"
              onclick="showProduct(${product.id})"
            >

          </div>

          <div class="card-body d-flex flex-column">

            <h5 onclick="showProduct(${product.id})">
              ${product.name}
            </h5>

            <p class="product-desc">
              ${product.description}
            </p>

            <div class="d-flex justify-content-between align-items-center mb-3">

              <span class="price">
                $${product.price}
              </span>

            </div>

            <div class="mt-auto d-flex gap-2">

              <button
                class="btn btn-primary-custom w-100"
                onclick="addToCart(${product.id})"
              >
                <i class="bi bi-cart-plus"></i>
                Add to Cart
              </button>

              <button
                class="btn btn-wishlist"
                onclick="toggleWishlist(${product.id}, this)"
              >
                <i class="bi bi-heart"></i>
              </button>

            </div>

          </div>

        </div>

      </div>

    `;
  });
}

function showProduct(id){

  const product = products.find(p => p.id === id);

  document.getElementById("modalTitle").innerText = product.name;
  document.getElementById("modalImage").src = product.image;
  document.getElementById("modalPrice").innerText = "$" + product.price;
  document.getElementById("modalDescription").innerText = product.description;

  new bootstrap.Modal(
    document.getElementById("productModal")
  ).show();
}

function addToCart(id){

  const product = products.find(p => p.id === id);

  const existing = cart.find(item => item.id === id);

  if(existing){

    existing.quantity++;

  }else{

    cart.push({
      ...product,
      quantity:1
    });
  }

  updateCart();

  showToast("Added to cart");
}

function removeFromCart(id){

  cart = cart.filter(item => item.id !== id);

  updateCart();
}

function updateCart(){

  const cartItems = document.getElementById("cartItems");
  const cartCount = document.getElementById("cartCount");
  const cartTotal = document.getElementById("cartTotal");

  cartItems.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach(item => {

    total += item.price * item.quantity;
    count += item.quantity;

    cartItems.innerHTML += `

      <div class="cart-item d-flex justify-content-between align-items-center">

        <div>

          <strong>${item.name}</strong>

          <br>

          $${item.price} × ${item.quantity}

        </div>

        <button
          class="btn btn-danger btn-sm rounded-3"
          onclick="removeFromCart(${item.id})"
        >
          Remove
        </button>

      </div>

    `;
  });

  cartCount.innerText = count;
  cartTotal.innerText = total;
}

function toggleWishlist(id,button){

  const product = products.find(p => p.id === id);

  const exists = wishlist.find(item => item.id === id);

  if(exists){

    wishlist = wishlist.filter(item => item.id !== id);

    button.classList.remove("active");

    showToast("Removed from wishlist");

  }else{

    wishlist.push(product);

    button.classList.add("active");

    showToast("Added to wishlist");
  }

  updateWishlist();
}

function updateWishlist(){

  const wishlistItems =
  document.getElementById("wishlistItems");

  const wishlistCount =
  document.getElementById("wishlistCount");

  wishlistItems.innerHTML = "";

  wishlist.forEach(item => {

    wishlistItems.innerHTML += `

      <div class="wishlist-item">

        <strong>${item.name}</strong>

        <br>

        $${item.price}

      </div>

    `;
  });

  wishlistCount.innerText = wishlist.length;
}

function checkout(){

  if(cart.length === 0){

    showToast("Your cart is empty");

    return;
  }

  showToast("Purchase completed successfully");

  cart = [];

  updateCart();

  bootstrap.Modal
  .getInstance(document.getElementById("cartModal"))
  .hide();
}

/* SEARCH */

document
.getElementById("searchInput")
.addEventListener("keyup",(e)=>{

  const value = e.target.value.toLowerCase();

  const filtered = products.filter(product =>

    product.name
    .toLowerCase()
    .includes(value)

  );

  displayProducts(filtered);

});

/* TOAST */

function showToast(message){

  const toast =
  document.getElementById("toast");

  toast.innerText = message;

  toast.classList.add("show");

  setTimeout(()=>{

    toast.classList.remove("show");

  },2500);
}

/* DARK MODE */

function toggleDarkMode(){

  document.body.classList.toggle("dark-mode");

}

/* INITIALIZE */

displayProducts(products);

</script>

</body>
</html>
